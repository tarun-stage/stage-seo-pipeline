name: SEO Weekly Keyword Analysis

on:
  schedule:
    - cron: '30 4 */2 * *'  # Every alternate day 10:00 AM IST (4:30 AM UTC)
  workflow_dispatch:

jobs:
  keyword-analysis:
    name: Analyze Keywords & Trigger Agent
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: packages/gsc-keyword-tracker
        run: npm install && npm run build

      - name: Fetch keywords from GSC
        id: analyze
        working-directory: packages/gsc-keyword-tracker
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "date=${DATE}" >> $GITHUB_OUTPUT

          node dist/cli.js track --site "$GSC_SITE_URL" --db gsc_keywords.db 2>&1 | tee /tmp/output.txt

          TOTAL=$(grep -oP 'Total keywords: \K[0-9]+' /tmp/output.txt || echo "0")
          RISING=$(grep -oP 'Rising: \K[0-9]+' /tmp/output.txt | head -1 || echo "0")
          NEW_KW=$(grep -oP 'New: \K[0-9]+' /tmp/output.txt | head -1 || echo "0")
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "rising=${RISING}" >> $GITHUB_OUTPUT
          echo "new_kw=${NEW_KW}" >> $GITHUB_OUTPUT

          node dist/cli.js trends --db gsc_keywords.db --direction rising --limit 50 2>&1 > /tmp/rising.txt
          node dist/cli.js trends --db gsc_keywords.db --direction new --limit 30 2>&1 > /tmp/new.txt

          echo "=== RISING ===" > /tmp/all_keywords.txt
          cat /tmp/rising.txt >> /tmp/all_keywords.txt
          echo "" >> /tmp/all_keywords.txt
          echo "=== NEW ===" >> /tmp/all_keywords.txt
          cat /tmp/new.txt >> /tmp/all_keywords.txt

      - name: Check for existing keyword issue today
        id: dedup
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
        run: |
          DATE=${{ steps.analyze.outputs.date }}
          EXISTING=$(curl -s \
            "$PAPERCLIP_API_URL/api/companies/f0a0b0c0-0001-4000-8000-000000000001/issues?status=todo&status=in_progress" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" | \
            node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const arr = Array.isArray(d) ? d : (d.issues || d.data || []);
              console.log(arr.some(i => i.title && i.title.includes('Weekly keywords') && i.title.includes('${DATE}')) ? 'yes' : 'no');
            " 2>/dev/null || echo "no")
          echo "exists=${EXISTING}" >> $GITHUB_OUTPUT
          echo "Duplicate check: exists=${EXISTING}"

      - name: Create Paperclip issue & wake agent
        if: steps.dedup.outputs.exists != 'yes'
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
        run: |
          DATE=${{ steps.analyze.outputs.date }}
          TOTAL=${{ steps.analyze.outputs.total }}
          RISING=${{ steps.analyze.outputs.rising }}
          NEW_KW=${{ steps.analyze.outputs.new_kw }}
          COMPANY_ID="f0a0b0c0-0001-4000-8000-000000000001"
          AGENT_ID="f1000001-0003-4000-8000-000000000001"

          cat > /tmp/build_desc.js << 'NODESCRIPT'
          const date = process.env.DATE;
          const total = process.env.TOTAL;
          const rising = process.env.RISING;
          const newKw = process.env.NEW_KW;
          const kw = require('fs').readFileSync('/tmp/all_keywords.txt', 'utf8');

          const desc = [
            '## GSC Keywords — ' + date,
            '',
            'Stats: ' + total + ' total | ' + rising + ' rising | ' + newKw + ' new',
            '',
            '## All trending keywords from Google Search Console',
            '',
            '```',
            kw.trim(),
            '```',
            '',
            '## Your job',
            '',
            'Update ONLY `src/config/seo-keywords.ts` in vatsanatech/stage-webapp and raise a PR.',
            '',
            '### Step 0: Read seo-program.md FIRST (autoresearch loop)',
            'Before doing ANYTHING else:',
            '1. Read `seo-program.md` from vatsanatech/stage-seo-pipeline repo (main branch)',
            '2. Read Keyword Rules section — apply all listed rules',
            '3. Read Failure Log — skip any keyword approaches that failed before',
            '4. Read High Confidence Lessons — apply confirmed patterns',
            '',
            '### Before You Start (Plan Node)',
            '1. Check git log for keywords removed in previous PRs — do NOT re-add them',
            '2. Classify keywords by intent before placing them',
            '3. Plan which keywords go where before making any changes',
            '',
            '### Branch setup',
            '1. Clone vatsanatech/stage-webapp',
            '2. git checkout main && git pull origin main',
            '3. git checkout -b chore/seo-keywords-' + date,
            '4. Make changes ONLY to `src/config/seo-keywords.ts`',
            '5. Run `npx prettier --write src/config/seo-keywords.ts` before committing',
            '6. Commit: `chore(seo): update weekly keywords ' + date + '`',
            '7. Push and raise PR against main',
            '',
            '### Keyword Classification Rules (NEW — follow these)',
            'Classify each keyword by search intent:',
            '- **transactional** (HIGHEST priority): watch, download, stream, subscribe, free, online, app, play',
            '- **navigational**: stage.in, stage app, stage ott, stage platform',
            '- **commercial**: best, top, vs, compare, review, price, plan, premium',
            '- **informational** (lowest priority): what is, how to, meaning, list of',
            '',
            'Add intent comment in code: // intent: transactional',
            'PRIORITY ORDER when adding keywords: transactional > commercial > navigational > informational',
            'Transactional keywords drive subscriptions — weight these highest.',
            '',
            '### Placement Rules',
            '- Decide which page: homepage (brand only), movies, shows, or multiple',
            '- A keyword CAN go on multiple pages if relevant',
            '- Skip vulgar/adult/inappropriate keywords',
            '- Group keywords by dialect (haryanvi, rajasthani, bhojpuri, gujarati)',
            '- Homepage only gets brand/generic keywords (stage app, stage ott, etc)',
            '- Use EXACT keywords from GSC data — do not fabricate',
            '- Generate natural long-tail variants for top 5 transactional keywords',
            '- Check for cannibalization — same keyword on competing pages is a problem',
            '',
            '### File structure (just update the arrays)',
            '```typescript',
            'const KEYWORDS: Record<string, { brand: string[]; movies: string[]; shows: string[] }> = {',
            '  haryanvi: { brand: [...], movies: [...], shows: [...] },',
            '  rajasthani: { ... },',
            '  ...',
            '};',
            '```',
            '',
            '### Rules',
            '- ONLY update `src/config/seo-keywords.ts` — NO other files',
            '- Do NOT add markdown, docs, or report files',
            '- Do NOT modify page.tsx files — they already import from seo-keywords.ts',
            '',
            '### After PR raised — Slack notification',
            'curl -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d \'{"text": "*SEO Keywords — ' + date + '*\\nHi <@U07A91AB7GW>, review this PR: PR_URL\\n\\n*Stats:* ' + total + ' tracked | ' + rising + ' rising | ' + newKw + ' new\\n*Top 5 transactional keywords added:*\\n1. ..."}\'',
            '',
            'CRITICAL: Use <@U07A91AB7GW> exactly as written for Slack mention.',
            '',
            '### After You Finish — Update seo-program.md (autoresearch loop)',
            'MANDATORY — do this after every run:',
            '1. Open `seo-program.md` in vatsanatech/stage-seo-pipeline (main branch)',
            '2. Add entry to Experiment Log: keywords added count, which dialect grew most, any issues',
            '3. Update Keyword Rules if you discovered a new pattern (e.g. "gujarati keywords → higher CTR")',
            '4. Move any failed approach to Failure Log with reason',
            '5. Commit directly to main: `chore(seo): update program.md after keywords run ' + date + '`',
            '   — Do NOT raise a PR for this commit, push directly to main',
          ].join('\n');

          console.log(JSON.stringify(desc));
          NODESCRIPT

          DESC_JSON=$(DATE="${DATE}" TOTAL="${TOTAL}" RISING="${RISING}" NEW_KW="${NEW_KW}" node /tmp/build_desc.js)

          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/companies/$COMPANY_ID/issues" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"Weekly keywords ${DATE} — ${TOTAL} tracked, ${RISING} rising, ${NEW_KW} new\",
              \"description\": $DESC_JSON,
              \"status\": \"todo\",
              \"priority\": \"high\",
              \"assigneeAgentId\": \"$AGENT_ID\"
            }" && echo "Issue created" || echo "Issue creation failed"

          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/agents/$AGENT_ID/wakeup" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"reason\": \"Weekly keywords ${DATE}\"}" \
            && echo "Agent wakeup sent" || echo "Wakeup failed"

      - name: Skip (duplicate issue exists)
        if: steps.dedup.outputs.exists == 'yes'
        run: echo "Keyword issue for ${{ steps.analyze.outputs.date }} already exists — skipping creation"
