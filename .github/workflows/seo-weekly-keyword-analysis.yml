name: SEO Weekly Keyword Analysis

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM UTC
  workflow_dispatch:

jobs:
  keyword-analysis:
    name: Analyze Keywords & Trigger Agent
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: packages/gsc-keyword-tracker
        run: npm install && npm run build

      - name: Run keyword analysis
        id: analyze
        working-directory: packages/gsc-keyword-tracker
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "date=${DATE}" >> $GITHUB_OUTPUT

          # Run tracker
          node dist/cli.js track --site "$GSC_SITE_URL" --db gsc_keywords.db 2>&1 | tee /tmp/output.txt

          # Extract stats
          TOTAL=$(grep -oP 'Total keywords: \K[0-9]+' /tmp/output.txt || echo "0")
          RISING=$(grep -oP 'Rising: \K[0-9]+' /tmp/output.txt | head -1 || echo "0")
          NEW_KW=$(grep -oP 'New: \K[0-9]+' /tmp/output.txt | head -1 || echo "0")

          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "rising=${RISING}" >> $GITHUB_OUTPUT
          echo "new_kw=${NEW_KW}" >> $GITHUB_OUTPUT

          # Extract top rising keywords per dialect as JSON
          node dist/cli.js trends --db gsc_keywords.db --direction rising --limit 20 --format json 2>/dev/null > /tmp/rising.json || true
          node dist/cli.js trends --db gsc_keywords.db --direction new --limit 10 --format json 2>/dev/null > /tmp/new.json || true

          # Build keyword lists per dialect from raw data
          node -e "
            const db = require('better-sqlite3')('gsc_keywords.db');

            // Top 10 rising keywords per dialect
            const dialects = ['haryanvi', 'rajasthani', 'bhojpuri', 'gujarati'];
            const result = {};

            for (const d of dialects) {
              const rows = db.prepare(\`
                SELECT query, clicks_current, clicks_previous,
                       (clicks_current - clicks_previous) as change
                FROM keyword_trends
                WHERE dialect = ? AND direction = 'rising'
                ORDER BY change DESC LIMIT 10
              \`).all(d);
              result[d] = rows.map(r => ({
                keyword: r.query,
                clicks: r.clicks_current,
                change: '+' + r.change
              }));
            }

            // Also get general/brand keywords (not content-specific)
            const brandRows = db.prepare(\`
              SELECT query, clicks_current
              FROM keyword_trends
              WHERE direction = 'rising'
                AND query NOT LIKE '%movie%'
                AND query NOT LIKE '%film%'
                AND query NOT LIKE '%download%'
                AND query NOT LIKE '%watch%'
                AND query NOT LIKE '%naate%'
                AND query NOT LIKE '%nate%'
              ORDER BY clicks_current DESC LIMIT 10
            \`).all();
            result['brand_generic'] = brandRows.map(r => ({
              keyword: r.query,
              clicks: r.clicks_current
            }));

            console.log(JSON.stringify(result, null, 2));
          " > /tmp/keywords_by_dialect.json 2>/dev/null || echo '{}' > /tmp/keywords_by_dialect.json

          echo "Keywords extracted:"
          cat /tmp/keywords_by_dialect.json | head -50

      - name: Create Paperclip issue & wake agent
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
        run: |
          DATE=${{ steps.analyze.outputs.date }}
          TOTAL=${{ steps.analyze.outputs.total }}
          RISING=${{ steps.analyze.outputs.rising }}
          NEW_KW=${{ steps.analyze.outputs.new_kw }}

          COMPANY_ID="f0a0b0c0-0001-4000-8000-000000000001"
          AGENT_ID="f1000001-0003-4000-8000-000000000001"

          # Read extracted keywords
          KEYWORDS_JSON=$(cat /tmp/keywords_by_dialect.json)

          # Build issue description with ACTUAL keyword data
          DESCRIPTION=$(node -e "
            const kw = JSON.parse(process.argv[1]);
            const lines = [];
            lines.push('## Weekly Keyword Analysis — ${DATE}');
            lines.push('');
            lines.push('Stats: ${TOTAL} total | ${RISING} rising | ${NEW_KW} new');
            lines.push('');
            lines.push('## ACTUAL Trending Keywords from GSC (use these EXACTLY, do NOT fabricate)');
            lines.push('');

            for (const [dialect, keywords] of Object.entries(kw)) {
              if (dialect === 'brand_generic') continue;
              lines.push('### ' + dialect);
              keywords.forEach(k => lines.push('- \`' + k.keyword + '\` (clicks: ' + k.clicks + ', ' + k.change + ')'));
              lines.push('');
            }

            lines.push('### Brand/Generic keywords (for HOMEPAGE only)');
            (kw.brand_generic || []).forEach(k => lines.push('- \`' + k.keyword + '\` (clicks: ' + k.clicks + ')'));
            lines.push('');
            lines.push('## Instructions');
            lines.push('');
            lines.push('1. Create \`src/config/seo-keywords.ts\` using the EXACT keywords listed above');
            lines.push('2. Homepage (\`src/app/[lang]/[dialect]/page.tsx\`) should ONLY get brand/generic keywords');
            lines.push('3. Content-specific trending keywords (movies, shows, naate etc) go on content detail pages ONLY');
            lines.push('4. Create weekly report at \`seo/keyword-analysis/${DATE}.md\` with the same data');
            lines.push('5. Raise PR to vatsanatech/stage-webapp');
            lines.push('');
            lines.push('IMPORTANT: Use ONLY the keywords listed above. Do NOT make up or guess keywords.');

            console.log(JSON.stringify(lines.join('\n')));
          " \"\$KEYWORDS_JSON\")

          # Create issue
          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/companies/$COMPANY_ID/issues" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"Weekly keyword analysis ${DATE} — ${TOTAL} tracked, ${RISING} rising, ${NEW_KW} new\",
              \"description\": $DESCRIPTION,
              \"status\": \"todo\",
              \"priority\": \"high\",
              \"assigneeAgentId\": \"$AGENT_ID\"
            }" && echo "Issue created" || echo "Issue creation failed (non-critical)"

          # Wake agent
          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/agents/$AGENT_ID/wakeup" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"reason\": \"Weekly keyword analysis ${DATE} — new task assigned\"}" \
            && echo "Agent wakeup sent" || echo "Wakeup failed (non-critical)"
