name: SEO Weekly Keyword Analysis

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM UTC
  workflow_dispatch:

jobs:
  keyword-analysis:
    name: Analyze Keywords & Trigger Agent
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: packages/gsc-keyword-tracker
        run: npm install && npm run build

      - name: Fetch keywords from GSC & analyze trends
        id: analyze
        working-directory: packages/gsc-keyword-tracker
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "date=${DATE}" >> $GITHUB_OUTPUT

          # Fetch from GSC API and analyze trends
          node dist/cli.js track --site "$GSC_SITE_URL" --db gsc_keywords.db 2>&1 | tee /tmp/output.txt

          # Extract stats
          TOTAL=$(grep -oP 'Total keywords: \K[0-9]+' /tmp/output.txt || echo "0")
          RISING=$(grep -oP 'Rising: \K[0-9]+' /tmp/output.txt | head -1 || echo "0")
          NEW_KW=$(grep -oP 'New: \K[0-9]+' /tmp/output.txt | head -1 || echo "0")
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "rising=${RISING}" >> $GITHUB_OUTPUT
          echo "new_kw=${NEW_KW}" >> $GITHUB_OUTPUT

          # Get top rising per dialect using CLI (reads GSC data already fetched)
          echo "--- HARYANVI RISING ---" > /tmp/keywords.txt
          node dist/cli.js trends --db gsc_keywords.db --direction rising --dialect haryanvi --limit 10 2>&1 >> /tmp/keywords.txt
          echo "--- RAJASTHANI RISING ---" >> /tmp/keywords.txt
          node dist/cli.js trends --db gsc_keywords.db --direction rising --dialect rajasthani --limit 10 2>&1 >> /tmp/keywords.txt
          echo "--- BHOJPURI RISING ---" >> /tmp/keywords.txt
          node dist/cli.js trends --db gsc_keywords.db --direction rising --dialect bhojpuri --limit 10 2>&1 >> /tmp/keywords.txt
          echo "--- GUJARATI RISING ---" >> /tmp/keywords.txt
          node dist/cli.js trends --db gsc_keywords.db --direction rising --dialect gujarati --limit 10 2>&1 >> /tmp/keywords.txt
          echo "--- NEW KEYWORDS ---" >> /tmp/keywords.txt
          node dist/cli.js trends --db gsc_keywords.db --direction new --limit 15 2>&1 >> /tmp/keywords.txt

          cat /tmp/keywords.txt
          echo "Keywords extracted from GSC data"

      - name: Create Paperclip issue & wake agent
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
        run: |
          DATE=${{ steps.analyze.outputs.date }}
          TOTAL=${{ steps.analyze.outputs.total }}
          RISING=${{ steps.analyze.outputs.rising }}
          NEW_KW=${{ steps.analyze.outputs.new_kw }}

          COMPANY_ID="f0a0b0c0-0001-4000-8000-000000000001"
          AGENT_ID="f1000001-0003-4000-8000-000000000001"

          # Read GSC keyword data
          KEYWORDS_DATA=$(cat /tmp/keywords.txt)

          # Build description
          read -r -d '' DESCRIPTION << 'DESCEOF' || true
          ## Weekly Keyword Analysis — DATE_PLACEHOLDER

          Stats: TOTAL_PLACEHOLDER total | RISING_PLACEHOLDER rising | NEW_PLACEHOLDER new

          ## ACTUAL Trending Keywords from Google Search Console

          KEYWORDS_PLACEHOLDER

          ## Instructions for PR

          1. Create `src/config/seo-keywords.ts` with the EXACT keywords listed above
          2. **Homepage** (`src/app/[lang]/[dialect]/page.tsx`) → ONLY generic brand keywords (like "stage app", "haryanvi shows online", "rajasthani entertainment"). Do NOT put movie/film/content-specific keywords on homepage
          3. **Content detail pages** → Put trending content keywords (movies, shows, naate etc) on watch/movies/shows pages ONLY
          4. Create report at `seo/keyword-analysis/DATE_PLACEHOLDER.md` with same GSC data
          5. Raise PR to vatsanatech/stage-webapp
          6. seo-keywords.ts and .md report MUST have the SAME keywords — both from GSC data above

          IMPORTANT: Use ONLY keywords from the GSC data above. Do NOT fabricate or guess keywords.
          DESCEOF

          DESCRIPTION="${DESCRIPTION//DATE_PLACEHOLDER/$DATE}"
          DESCRIPTION="${DESCRIPTION//TOTAL_PLACEHOLDER/$TOTAL}"
          DESCRIPTION="${DESCRIPTION//RISING_PLACEHOLDER/$RISING}"
          DESCRIPTION="${DESCRIPTION//NEW_PLACEHOLDER/$NEW_KW}"
          DESCRIPTION="${DESCRIPTION//KEYWORDS_PLACEHOLDER/$KEYWORDS_DATA}"

          # JSON encode the description
          DESC_JSON=$(node -e "console.log(JSON.stringify(process.argv[1]))" "$DESCRIPTION")

          # Create issue
          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/companies/$COMPANY_ID/issues" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"Weekly keyword analysis ${DATE} — ${TOTAL} tracked, ${RISING} rising, ${NEW_KW} new\",
              \"description\": $DESC_JSON,
              \"status\": \"todo\",
              \"priority\": \"high\",
              \"assigneeAgentId\": \"$AGENT_ID\"
            }" && echo "Issue created" || echo "Issue creation failed (non-critical)"

          # Wake agent
          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/agents/$AGENT_ID/wakeup" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"reason\": \"Weekly keyword analysis ${DATE} — new task assigned\"}" \
            && echo "Agent wakeup sent" || echo "Wakeup failed (non-critical)"
