name: SEO CTR Benchmark Analysis

on:
  schedule:
    - cron: '30 3 * * 5'
  workflow_dispatch:

jobs:
  ctr-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis

      - name: Decode GSC service account key
        run: echo "$GSC_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gsc-key.json
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}

      - name: Run CTR benchmark analysis
        id: ctr
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: |
          node << 'EOF'
          const { google } = require('googleapis');
          const fs = require('fs');

          const CTR_BENCHMARKS = {
            1: 0.28,
            2: 0.15,
            3: 0.11,
            4: 0.08,
            5: 0.07,
            6: 0.06,
            7: 0.05,
            8: 0.045,
            9: 0.04,
            10: 0.035,
          };

          function getBenchmarkCtr(position) {
            const pos = Math.round(position);
            if (pos < 1) return CTR_BENCHMARKS[1];
            if (pos > 10) return CTR_BENCHMARKS[10];
            return CTR_BENCHMARKS[pos] || CTR_BENCHMARKS[10];
          }

          async function main() {
            const key = JSON.parse(fs.readFileSync('/tmp/gsc-key.json', 'utf8'));
            const auth = new google.auth.GoogleAuth({
              credentials: key,
              scopes: ['https://www.googleapis.com/auth/webmasters.readonly'],
            });
            const authClient = await auth.getClient();
            const sc = google.searchconsole({ version: 'v1', auth: authClient });
            const siteUrl = process.env.GSC_SITE_URL;

            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 28);
            const fmt = d => d.toISOString().slice(0, 10);

            const res = await sc.searchanalytics.query({
              siteUrl,
              requestBody: {
                startDate: fmt(startDate),
                endDate: fmt(endDate),
                dimensions: ['page', 'query'],
                rowLimit: 5000,
              },
            });

            const rows = res.data.rows || [];

            // Aggregate by page
            const byPage = {};
            for (const row of rows) {
              const [page] = row.keys;
              if (!byPage[page]) {
                byPage[page] = { clicks: 0, impressions: 0, positionSum: 0, rowCount: 0 };
              }
              byPage[page].clicks += row.clicks;
              byPage[page].impressions += row.impressions;
              byPage[page].positionSum += row.position * row.impressions;
              byPage[page].rowCount += row.impressions;
            }

            const underperformers = [];
            for (const [page, data] of Object.entries(byPage)) {
              if (data.impressions <= 200) continue;
              const avgPosition = data.rowCount > 0 ? data.positionSum / data.rowCount : 11;
              const actualCtr = data.impressions > 0 ? data.clicks / data.impressions : 0;
              const benchmarkCtr = getBenchmarkCtr(avgPosition);
              if (actualCtr < benchmarkCtr * 0.6) {
                const lostClicks = Math.round((benchmarkCtr - actualCtr) * data.impressions);
                underperformers.push({
                  page,
                  avgPosition: avgPosition.toFixed(1),
                  actualCtr: (actualCtr * 100).toFixed(2),
                  benchmarkCtr: (benchmarkCtr * 100).toFixed(2),
                  impressions: data.impressions,
                  lostClicks,
                });
              }
            }

            underperformers.sort((a, b) => b.lostClicks - a.lostClicks);
            const top15 = underperformers.slice(0, 15);

            const lines = top15.map((p, i) =>
              `${i + 1}. ${p.page}\n   Pos: ${p.avgPosition} | Actual CTR: ${p.actualCtr}% | Benchmark: ${p.benchmarkCtr}% | Impressions: ${p.impressions} | Est. Lost Clicks: ${p.lostClicks}`
            ).join('\n\n');

            const output = top15.length > 0
              ? `Found ${underperformers.length} underperforming pages (CTR >40% below benchmark). Top 15:\n\n${lines}`
              : 'No significant CTR underperformers found this week.';

            fs.writeFileSync('/tmp/ctr-output.txt', output);
            console.log(output);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Create Paperclip issue
        id: paperclip
        run: |
          REPORT=$(cat /tmp/ctr-output.txt)
          RESPONSE=$(curl -s -X POST "${{ secrets.PAPERCLIP_API_URL }}/v1/companies/f0a0b0c0-0001-4000-8000-000000000001/issues" \
            -H "Authorization: Bearer ${{ secrets.PAPERCLIP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg title "SEO CTR Benchmark Report - $(date +'%Y-%m-%d')" --arg body "$REPORT" '{title: $title, body: $body, priority: "medium"}')")
          echo "issue_id=$(echo $RESPONSE | jq -r '.id // empty')" >> $GITHUB_OUTPUT

      - name: Wake up Paperclip agent
        run: |
          curl -s -X POST "${{ secrets.PAPERCLIP_API_URL }}/v1/companies/f0a0b0c0-0001-4000-8000-000000000001/agents/f1000001-0002-4000-8000-000000000001/wakeup" \
            -H "Authorization: Bearer ${{ secrets.PAPERCLIP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg issue_id "${{ steps.paperclip.outputs.issue_id }}" '{issue_id: $issue_id, context: "SEO CTR benchmark analysis complete. Pages are significantly underperforming industry CTR benchmarks. Please review title/meta description opportunities."}')"

      - name: Send Slack notification
        run: |
          REPORT=$(cat /tmp/ctr-output.txt)
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "*SEO CTR Benchmark Analysis* — $(date +'%Y-%m-%d')\n\`\`\`${REPORT}\`\`\`\n*Paperclip Issue:* ${{ steps.paperclip.outputs.issue_id }}" '{text: $text}')"
