name: SEO Pipeline — OTT Improvements

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/site-crawler/**'
      - 'packages/auto-fix-pipeline/**'

jobs:
  create-improvement-task:
    name: Create Paperclip Task & Wake Agent
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Create Paperclip issue & wake agent
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          COMPANY_ID="f0a0b0c0-0001-4000-8000-000000000001"
          AGENT_ID="f1000001-0002-4000-8000-000000000001"

          cat > /tmp/build_ott_desc.js << 'NODESCRIPT'
          const date = process.env.RUN_DATE;
          const desc = [
            '## OTT SEO Pipeline Improvements — ' + date,
            '',
            'Implement 4 targeted improvements to the `vatsanatech/stage-seo-pipeline` repo.',
            'These are all code changes to the pipeline itself, NOT to stage-webapp.',
            '',
            '### Branch setup',
            '1. Clone `vatsanatech/stage-seo-pipeline`',
            '2. `git checkout main && git pull origin main`',
            '3. `git checkout -b fix/ott-seo-improvements-' + date + '`',
            '',
            '---',
            '',
            '## Fix 1 — Wire SSR Diff Check (CRITICAL)',
            '',
            '**Why:** `js-rendering.ts` has full SSR diff logic (`compareRendering`, `fetchRawHtml`) but is never called anywhere. `CrawledPage` has `renderedHtml?` field that is never populated. Pipeline never detects pages where Google cannot see meta/schema because they are JS-only.',
            '',
            '### Step 1A — `packages/site-crawler/src/models/types.ts`',
            '',
            'Add `rawHtml?: string;` to `CrawledPage` after `html: string;`:',
            '```typescript',
            'export interface CrawledPage {',
            '  url: string;',
            '  statusCode: number;',
            '  title: string;',
            '  html: string;',
            '  rawHtml?: string;        // ADD THIS',
            '  renderedHtml?: string;',
            '  headers: Record<string, string>;',
            '  depth: number;',
            '  crawledAt: string;',
            '  loadTimeMs: number;',
            '}',
            '```',
            '',
            'Add `js_rendering`, `hreflang`, `ott_schema` to `AuditCategory`:',
            "```typescript",
            "export type AuditCategory =",
            "  | 'meta_title'",
            "  | 'meta_description'",
            "  | 'canonical'",
            "  | 'og_tags'",
            "  | 'twitter_cards'",
            "  | 'h1'",
            "  | 'schema_markup'",
            "  | 'ott_schema'",
            "  | 'hreflang'",
            "  | 'js_rendering'",
            "  | 'status_code'",
            "  | 'redirect';",
            '```',
            '',
            '### Step 1B — `packages/site-crawler/src/crawl/crawler.ts`',
            '',
            'Add import at top:',
            "```typescript",
            "import { fetchRawHtml } from '../audit/js-rendering.js';",
            '```',
            '',
            'In `crawlPage()`, after `const html = await page.content();`, add:',
            '```typescript',
            'let rawHtml: string | undefined;',
            'try {',
            '  rawHtml = await fetchRawHtml(url);',
            '} catch {',
            '  // raw fetch failed — skip SSR diff for this page',
            '}',
            '```',
            '',
            'Add `rawHtml,` to the returned object.',
            '',
            '### Step 1C — `packages/site-crawler/src/audit/runner.ts`',
            '',
            'Add import:',
            "```typescript",
            "import { compareRendering } from './js-rendering.js';",
            '```',
            '',
            'In `onPageCrawled`, after `const issues = auditPage(page, runId);`, add:',
            '```typescript',
            'if (page.rawHtml) {',
            '  const diff = compareRendering(page.url, page.rawHtml, page.html);',
            '  for (const jsIssue of diff.issues) {',
            '    const auditIssue: AuditIssue = {',
            "      url: jsIssue.url,",
            "      category: 'js_rendering',",
            '      severity: jsIssue.severity,',
            '      message: jsIssue.message,',
            '      details: `raw: "${jsIssue.rawValue}" rendered: "${jsIssue.renderedValue}"`,',
            '      crawlRunId: runId,',
            '      crawledAt: page.crawledAt,',
            '    };',
            '    insertAuditIssue(db, auditIssue);',
            '    allIssues.push(auditIssue);',
            '  }',
            '}',
            '```',
            '',
            '---',
            '',
            '## Fix 2 — OTT Schema Type Check (CRITICAL)',
            '',
            '**Why:** Current `checkSchemaMarkup` only checks if ANY schema exists. OTT content pages must have `VideoObject`, `Movie`, or `TVSeries` schema for Google "Watch on Stage" rich results.',
            '',
            '### File: `packages/site-crawler/src/audit/checks.ts`',
            '',
            'Add after `checkSchemaMarkup`:',
            '```typescript',
            "const OTT_URL_PATTERNS = [/\\/movies\\//, /\\/shows\\//, /\\/watch\\//];",
            "const OTT_SCHEMA_TYPES = ['VideoObject', 'Movie', 'TVSeries', 'TVEpisode', 'TVSeason'];",
            '',
            'const checkOttSchema: CheckFn = (page, $, runId) => {',
            '  const issues: AuditIssue[] = [];',
            '  if (!OTT_URL_PATTERNS.some(p => p.test(page.url))) return issues;',
            '  const presentTypes: string[] = [];',
            "  $('script[type=\"application/ld+json\"]').each((_, el) => {",
            '    const content = $(el).html();',
            '    if (!content) return;',
            '    try {',
            "      const parsed = JSON.parse(content);",
            "      if (parsed['@graph'] && Array.isArray(parsed['@graph'])) {",
            "        parsed['@graph'].forEach((n: any) => { if (n['@type']) presentTypes.push(n['@type']); });",
            "      } else if (parsed['@type']) {",
            "        presentTypes.push(parsed['@type']);",
            '      }',
            '    } catch {}',
            '  });',
            '  const hasOttSchema = OTT_SCHEMA_TYPES.some(t => presentTypes.includes(t));',
            '  if (!hasOttSchema) {',
            "    issues.push(issue(page.url, 'ott_schema', 'critical',",
            "      `OTT page missing VideoObject/Movie/TVSeries schema (found: ${presentTypes.join(', ') || 'none'})`,",
            '      runId, page.crawledAt,',
            "      `Add one of: ${OTT_SCHEMA_TYPES.join(', ')}`",
            '    ));',
            '  }',
            '  return issues;',
            '};',
            '```',
            '',
            'Add `checkOttSchema` to `allChecks` array (after `checkSchemaMarkup`).',
            '',
            '---',
            '',
            '## Fix 3 — Hreflang Check (HIGH)',
            '',
            '**Why:** Stage.in dialect pages have no hreflang validation. Google confuses which page to show for which regional user — rankings split across dialect variants.',
            '',
            '### File: `packages/site-crawler/src/audit/checks.ts`',
            '',
            'Add after `checkOttSchema`:',
            '```typescript',
            "const DIALECT_SEGMENTS = ['/hi/', '/haryanvi/', '/rajasthani/', '/bhojpuri/', '/gujarati/'];",
            '',
            'const checkHreflang: CheckFn = (page, $, runId) => {',
            '  const issues: AuditIssue[] = [];',
            '  if (!DIALECT_SEGMENTS.some(s => page.url.includes(s))) return issues;',
            "  const hreflangTags = $('link[rel=\"alternate\"][hreflang]');",
            '  if (hreflangTags.length === 0) {',
            "    issues.push(issue(page.url, 'hreflang', 'warning',",
            "      'Dialect page missing hreflang alternate tags',",
            '      runId, page.crawledAt,',
            "      'Add hreflang tags for each language variant plus x-default'",
            '    ));',
            '    return issues;',
            '  }',
            "  if (!$('link[rel=\"alternate\"][hreflang=\"x-default\"]').length) {",
            "    issues.push(issue(page.url, 'hreflang', 'warning',",
            "      'Missing hreflang x-default tag',",
            '      runId, page.crawledAt,',
            "      'Add <link rel=\"alternate\" hreflang=\"x-default\" href=\"...\"> pointing to primary URL'",
            '    ));',
            '  }',
            '  return issues;',
            '};',
            '```',
            '',
            'Add `checkHreflang` to `allChecks` array (after `checkOttSchema`).',
            '',
            '---',
            '',
            '## Fix 4 — Video Sitemap Generator (HIGH)',
            '',
            '**Why:** Current sitemap has no video namespace. Google needs explicit video metadata to surface OTT content in Video Search and Google Discover.',
            '',
            '### File: `packages/site-crawler/src/audit/sitemap-generator.ts`',
            '',
            'Append at the end of the file:',
            '```typescript',
            'export interface VideoSitemapEntry {',
            '  loc: string;',
            '  video: {',
            '    title: string;',
            '    description: string;',
            '    thumbnailUrl: string;',
            '    contentUrl?: string;',
            '    duration?: number;',
            '    publicationDate?: string;',
            '    requiresSubscription?: boolean;',
            '    rating?: number;',
            '    tags?: string[];',
            '    category?: string;',
            '    live?: boolean;',
            '  };',
            '}',
            '',
            '/** Generate Google video sitemap. Use for movies, shows, episodes. */',
            'export function generateVideoSitemap(entries: VideoSitemapEntry[]): string {',
            '  const lines = [',
            '    \'<?xml version="1.0" encoding="UTF-8"?>\',',
            '    \'<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"\',',
            '    \'        xmlns:video="http://www.google.com/schemas/sitemap-video/1.1">\',',
            '  ];',
            '  for (const entry of entries) {',
            '    const v = entry.video;',
            '    lines.push(\'  <url>\');',
            '    lines.push(`    <loc>${escapeXml(entry.loc)}</loc>`);',
            '    lines.push(\'    <video:video>\');',
            '    lines.push(`      <video:thumbnail_loc>${escapeXml(v.thumbnailUrl)}</video:thumbnail_loc>`);',
            '    lines.push(`      <video:title>${escapeXml(v.title)}</video:title>`);',
            '    lines.push(`      <video:description>${escapeXml(v.description)}</video:description>`);',
            '    if (v.contentUrl) lines.push(`      <video:content_loc>${escapeXml(v.contentUrl)}</video:content_loc>`);',
            '    if (v.duration) lines.push(`      <video:duration>${v.duration}</video:duration>`);',
            '    if (v.publicationDate) lines.push(`      <video:publication_date>${escapeXml(v.publicationDate)}</video:publication_date>`);',
            '    lines.push(`      <video:requires_subscription>${v.requiresSubscription !== false ? \'yes\' : \'no\'}</video:requires_subscription>`);',
            '    if (v.rating !== undefined) lines.push(`      <video:rating>${v.rating.toFixed(1)}</video:rating>`);',
            '    lines.push(`      <video:live>${v.live ? \'yes\' : \'no\'}</video:live>`);',
            '    if (v.tags) v.tags.forEach(t => lines.push(`      <video:tag>${escapeXml(t)}</video:tag>`));',
            '    if (v.category) lines.push(`      <video:category>${escapeXml(v.category)}</video:category>`);',
            '    lines.push(\'    </video:video>\');',
            '    lines.push(\'  </url>\');',
            '  }',
            '  lines.push(\'</urlset>\');',
            '  return lines.join(\'\\n\');',
            '}',
            '```',
            '',
            '---',
            '',
            '## Final Steps',
            '',
            '1. Run: `cd packages/site-crawler && npx tsc --noEmit`',
            '2. Fix any TypeScript errors',
            '3. Run prettier: `npx prettier --write packages/site-crawler/src/models/types.ts packages/site-crawler/src/crawl/crawler.ts packages/site-crawler/src/audit/runner.ts packages/site-crawler/src/audit/checks.ts packages/site-crawler/src/audit/sitemap-generator.ts`',
            '4. Commit: `fix(seo): wire SSR diff, add OTT schema + hreflang + video sitemap ' + date + '`',
            '5. Push and raise PR against main in `vatsanatech/stage-seo-pipeline`',
            '6. Do NOT add markdown/docs/report files — only the 5 code files',
            '',
            '### After PR raised — Slack notification',
            'curl -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d \'{"text": "*SEO Pipeline OTT Improvements — ' + date + '*\\nHi <@U07A91AB7GW>, 4 OTT SEO improvements implemented. PR: <PR_URL>\\n\\n1. SSR diff check wired\\n2. OTT schema check (VideoObject/Movie/TVSeries)\\n3. Hreflang check for dialect pages\\n4. Video sitemap generator"}\'',
            '',
            'CRITICAL: Use <@U07A91AB7GW> exactly as written.',
          ].join('\n');
          console.log(JSON.stringify(desc));
          NODESCRIPT

          DESC_JSON=$(RUN_DATE="${DATE}" node /tmp/build_ott_desc.js)

          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/companies/$COMPANY_ID/issues" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"OTT SEO Pipeline Improvements — ${DATE} (SSR diff + schema + hreflang + video sitemap)\",
              \"description\": $DESC_JSON,
              \"status\": \"todo\",
              \"priority\": \"critical\",
              \"assigneeAgentId\": \"$AGENT_ID\"
            }" && echo "Issue created" || echo "Issue creation failed"

          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/agents/$AGENT_ID/wakeup" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"reason\": \"OTT SEO Pipeline Improvements ${DATE}\"}" \
            && echo "Agent wakeup sent" || echo "Wakeup failed"
