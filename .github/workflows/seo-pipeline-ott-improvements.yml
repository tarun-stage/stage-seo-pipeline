name: SEO Pipeline — OTT Improvements

on:
  workflow_dispatch:

jobs:
  create-improvement-task:
    name: Create Paperclip Task & Wake Agent
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Create Paperclip issue & wake agent
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          COMPANY_ID="f0a0b0c0-0001-4000-8000-000000000001"
          AGENT_ID="f1000001-0002-4000-8000-000000000001"

          DESC_JSON=$(node -e "
            const date = '${DATE}';
            const desc = [
              '## OTT SEO Pipeline Improvements — ' + date,
              '',
              'Implement 4 targeted improvements to the \`vatsanatech/stage-seo-pipeline\` repo.',
              'These are all code changes to the pipeline itself, NOT to stage-webapp.',
              '',
              '### Branch setup',
              '1. Clone \`vatsanatech/stage-seo-pipeline\`',
              '2. \`git checkout main && git pull origin main\`',
              '3. \`git checkout -b fix/ott-seo-improvements-' + date + '\`',
              '',
              '---',
              '',
              '## Fix 1 — Wire SSR Diff Check (CRITICAL)',
              '',
              '**Why:** \`js-rendering.ts\` has full SSR diff logic (\`compareRendering\`, \`fetchRawHtml\`) but it is never called anywhere. \`CrawledPage\` has \`renderedHtml?\` field that is never populated. This means the pipeline never detects pages where Google cannot see meta tags because they are JS-only.',
              '',
              '### Step 1A — \`packages/site-crawler/src/models/types.ts\`',
              '',
              'In the \`CrawledPage\` interface, add \`rawHtml?: string;\` after \`html: string;\`:',
              '```typescript',
              'export interface CrawledPage {',
              '  url: string;',
              '  statusCode: number;',
              '  title: string;',
              '  html: string;',
              '  rawHtml?: string;        // <-- ADD THIS',
              '  renderedHtml?: string;',
              '  headers: Record<string, string>;',
              '  depth: number;',
              '  crawledAt: string;',
              '  loadTimeMs: number;',
              '}',
              '```',
              '',
              'In the \`AuditCategory\` type, add \`js_rendering\`, \`hreflang\`, and \`ott_schema\`:',
              '```typescript',
              "export type AuditCategory =",
              "  | 'meta_title'",
              "  | 'meta_description'",
              "  | 'canonical'",
              "  | 'og_tags'",
              "  | 'twitter_cards'",
              "  | 'h1'",
              "  | 'schema_markup'",
              "  | 'ott_schema'      // <-- ADD",
              "  | 'hreflang'        // <-- ADD",
              "  | 'js_rendering'    // <-- ADD",
              "  | 'status_code'",
              "  | 'redirect';",
              '```',
              '',
              '### Step 1B — \`packages/site-crawler/src/crawl/crawler.ts\`',
              '',
              'Add import at the top:',
              '```typescript',
              "import { fetchRawHtml } from '../audit/js-rendering.js';",
              '```',
              '',
              'In \`crawlPage()\`, after \`const html = await page.content();\`, add raw HTML fetch:',
              '```typescript',
              'const html = await page.content();',
              'let rawHtml: string | undefined;',
              'try {',
              '  rawHtml = await fetchRawHtml(url);',
              '} catch {',
              '  // raw fetch failed — skip SSR diff for this page',
              '}',
              '```',
              '',
              'In the returned object, add \`rawHtml\`:',
              '```typescript',
              'return {',
              '  url,',
              '  statusCode,',
              '  title,',
              '  html,',
              '  rawHtml,',
              '  depth,',
              '  headers,',
              '  crawledAt: new Date().toISOString(),',
              '  loadTimeMs,',
              '};',
              '```',
              '',
              '### Step 1C — \`packages/site-crawler/src/audit/runner.ts\`',
              '',
              'Add import at the top (alongside existing imports):',
              '```typescript',
              "import { compareRendering } from './js-rendering.js';",
              "import type { AuditIssue } from '../models/types.js';",
              '```',
              '',
              'NOTE: \`AuditIssue\` may already be imported — only add if missing.',
              '',
              'In the \`onPageCrawled\` callback, after \`const issues = auditPage(page, runId);\`, add:',
              '```typescript',
              'if (page.rawHtml) {',
              '  const diff = compareRendering(page.url, page.rawHtml, page.html);',
              '  for (const jsIssue of diff.issues) {',
              '    const auditIssue: AuditIssue = {',
              "      url: jsIssue.url,",
              "      category: 'js_rendering',",
              '      severity: jsIssue.severity,',
              '      message: jsIssue.message,',
              '      details: `raw: "${jsIssue.rawValue}" → rendered: "${jsIssue.renderedValue}"`,',
              '      crawlRunId: runId,',
              '      crawledAt: page.crawledAt,',
              '    };',
              '    insertAuditIssue(db, auditIssue);',
              '    allIssues.push(auditIssue);',
              '  }',
              '}',
              '```',
              '',
              '---',
              '',
              '## Fix 2 — OTT Schema Type Check (CRITICAL)',
              '',
              '**Why:** Current \`checkSchemaMarkup\` only checks if ANY schema exists. For an OTT platform like Stage.in, content pages must have \`VideoObject\`, \`Movie\`, or \`TVSeries\` schema to get Google rich results ("Watch on Stage" button). This check enforces that.',
              '',
              '### File: \`packages/site-crawler/src/audit/checks.ts\`',
              '',
              'Add this function after the existing \`checkSchemaMarkup\` function:',
              '```typescript',
              'const OTT_URL_PATTERNS = [/\\/movies\\//, /\\/shows\\//, /\\/watch\\//];',
              "const OTT_SCHEMA_TYPES = ['VideoObject', 'Movie', 'TVSeries', 'TVEpisode', 'TVSeason'];",
              '',
              'const checkOttSchema: CheckFn = (page, $, runId) => {',
              '  const issues: AuditIssue[] = [];',
              '  if (!OTT_URL_PATTERNS.some(p => p.test(page.url))) return issues;',
              '',
              '  const presentTypes: string[] = [];',
              "  $('script[type=\"application/ld+json\"]').each((_, el) => {",
              '    const content = $(el).html();',
              '    if (!content) return;',
              '    try {',
              '      const parsed = JSON.parse(content);',
              '      if (parsed[\\'@graph\\'] && Array.isArray(parsed[\\'@graph\\'])) {',
              "        parsed['@graph'].forEach((node: any) => {",
              "          if (node['@type']) presentTypes.push(node['@type']);",
              '        });',
              "      } else if (parsed['@type']) {",
              "        presentTypes.push(parsed['@type']);",
              '      }',
              '    } catch { /* skip invalid JSON-LD */ }',
              '  });',
              '',
              '  const hasOttSchema = OTT_SCHEMA_TYPES.some(t => presentTypes.includes(t));',
              '  if (!hasOttSchema) {',
              "    issues.push(issue(",
              "      page.url, 'ott_schema', 'critical',",
              "      \`OTT content page missing VideoObject/Movie/TVSeries schema (found: \${presentTypes.join(', ') || 'none'})\`,",
              '      runId, page.crawledAt,',
              "      \`Add one of: \${OTT_SCHEMA_TYPES.join(', ')}\`",
              '    ));',
              '  }',
              '  return issues;',
              '};',
              '```',
              '',
              'Add \`checkOttSchema\` to the \`allChecks\` array:',
              '```typescript',
              'const allChecks: CheckFn[] = [',
              '  checkMetaTitle,',
              '  checkMetaDescription,',
              '  checkCanonical,',
              '  checkOgTags,',
              '  checkTwitterCards,',
              '  checkH1,',
              '  checkSchemaMarkup,',
              '  checkOttSchema,    // <-- ADD',
              '  checkStatusCode,',
              '];',
              '```',
              '',
              '---',
              '',
              '## Fix 3 — Hreflang Check (HIGH)',
              '',
              '**Why:** Stage.in has dialect pages under /hi/haryanvi/, /hi/rajasthani/, /hi/bhojpuri/, /hi/gujarati/. Without hreflang tags, Google confuses which page to show for which user and rankings split across dialect variants.',
              '',
              '### File: \`packages/site-crawler/src/audit/checks.ts\`',
              '',
              'Add this function after \`checkOttSchema\`:',
              '```typescript',
              "const DIALECT_URL_SEGMENTS = ['/hi/', '/haryanvi/', '/rajasthani/', '/bhojpuri/', '/gujarati/'];",
              '',
              'const checkHreflang: CheckFn = (page, $, runId) => {',
              '  const issues: AuditIssue[] = [];',
              '  const isDialectPage = DIALECT_URL_SEGMENTS.some(seg => page.url.includes(seg));',
              '  if (!isDialectPage) return issues;',
              '',
              "  const hreflangTags = $('link[rel=\"alternate\"][hreflang]');",
              '  if (hreflangTags.length === 0) {',
              '    issues.push(issue(',
              "      page.url, 'hreflang', 'warning',",
              "      'Dialect/language page missing hreflang alternate tags',",
              '      runId, page.crawledAt,',
              "      'Add <link rel=\"alternate\" hreflang=\"hi\" href=\"...\"> for each language variant + hreflang=\"x-default\"'",
              '    ));',
              '    return issues;',
              '  }',
              '',
              "  const hasXDefault = $('link[rel=\"alternate\"][hreflang=\"x-default\"]').length > 0;",
              '  if (!hasXDefault) {',
              '    issues.push(issue(',
              "      page.url, 'hreflang', 'warning',",
              "      'Missing hreflang x-default tag',",
              '      runId, page.crawledAt,',
              "      'Add <link rel=\"alternate\" hreflang=\"x-default\" href=\"...\"> pointing to primary URL'",
              '    ));',
              '  }',
              '  return issues;',
              '};',
              '```',
              '',
              'Add \`checkHreflang\` to the \`allChecks\` array:',
              '```typescript',
              'const allChecks: CheckFn[] = [',
              '  checkMetaTitle,',
              '  checkMetaDescription,',
              '  checkCanonical,',
              '  checkOgTags,',
              '  checkTwitterCards,',
              '  checkH1,',
              '  checkSchemaMarkup,',
              '  checkOttSchema,',
              '  checkHreflang,    // <-- ADD',
              '  checkStatusCode,',
              '];',
              '```',
              '',
              '---',
              '',
              '## Fix 4 — Video Sitemap Generation (HIGH)',
              '',
              '**Why:** Current sitemap has no video namespace. Google needs explicit video metadata (thumbnail, duration, requires_subscription) to surface video content in Video Search and Google Discover. Without it, Stage.in content is not eligible for video rich results.',
              '',
              '### File: \`packages/site-crawler/src/audit/sitemap-generator.ts\`',
              '',
              'Add these types and function at the END of the file (before nothing — just append):',
              '```typescript',
              'export interface VideoSitemapEntry {',
              '  loc: string;',
              '  video: {',
              '    title: string;',
              '    description: string;',
              '    thumbnailUrl: string;',
              '    contentUrl?: string;',
              '    duration?: number;         // seconds',
              '    publicationDate?: string;  // ISO 8601',
              '    requiresSubscription?: boolean;',
              '    rating?: number;           // 0.0-5.0',
              '    tags?: string[];',
              '    category?: string;',
              '    live?: boolean;',
              '  };',
              '}',
              '',
              '/**',
              ' * Generate a video sitemap with Google video extension namespace.',
              ' * Use for movies, shows, and episode pages on OTT platforms.',
              ' * Submit via Google Search Console for video rich results eligibility.',
              ' */',
              'export function generateVideoSitemap(entries: VideoSitemapEntry[]): string {',
              '  const lines = [',
              "    '<?xml version=\"1.0\" encoding=\"UTF-8\"?>',",
              "    '<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\"',",
              "    '        xmlns:video=\"http://www.google.com/schemas/sitemap-video/1.1\">',",
              '  ];',
              '',
              '  for (const entry of entries) {',
              '    const v = entry.video;',
              "    lines.push('  <url>');",
              '    lines.push(`    <loc>\${escapeXml(entry.loc)}</loc>`);',
              "    lines.push('    <video:video>');",
              '    lines.push(`      <video:thumbnail_loc>\${escapeXml(v.thumbnailUrl)}</video:thumbnail_loc>`);',
              '    lines.push(`      <video:title>\${escapeXml(v.title)}</video:title>`);',
              '    lines.push(`      <video:description>\${escapeXml(v.description)}</video:description>`);',
              "    if (v.contentUrl) lines.push(`      <video:content_loc>\${escapeXml(v.contentUrl)}</video:content_loc>`);",
              "    if (v.duration) lines.push(`      <video:duration>\${v.duration}</video:duration>`);",
              "    if (v.publicationDate) lines.push(`      <video:publication_date>\${escapeXml(v.publicationDate)}</video:publication_date>`);",
              '    lines.push(`      <video:requires_subscription>\${v.requiresSubscription !== false ? \\'yes\\' : \\'no\\'}</video:requires_subscription>`);',
              "    if (v.rating !== undefined) lines.push(`      <video:rating>\${v.rating.toFixed(1)}</video:rating>`);",
              '    lines.push(`      <video:live>\${v.live ? \\'yes\\' : \\'no\\'}</video:live>`);',
              "    if (v.tags) { for (const tag of v.tags) lines.push(`      <video:tag>\${escapeXml(tag)}</video:tag>`); }",
              "    if (v.category) lines.push(`      <video:category>\${escapeXml(v.category)}</video:category>`);",
              "    lines.push('    </video:video>');",
              "    lines.push('  </url>');",
              '  }',
              '',
              "  lines.push('</urlset>');",
              "  return lines.join('\\n');",
              '}',
              '```',
              '',
              '---',
              '',
              '## Final Steps',
              '',
              '### After all 4 fixes are applied:',
              '1. Run TypeScript check: \`cd packages/site-crawler && npx tsc --noEmit\`',
              '2. Fix any type errors before committing',
              '3. Run: \`npx prettier --write packages/site-crawler/src/models/types.ts packages/site-crawler/src/crawl/crawler.ts packages/site-crawler/src/audit/runner.ts packages/site-crawler/src/audit/checks.ts packages/site-crawler/src/audit/sitemap-generator.ts\`',
              '4. Commit: \`fix(seo): wire SSR diff check, add OTT schema + hreflang + video sitemap ' + date + '\`',
              '5. Push and raise PR against main in \`vatsanatech/stage-seo-pipeline\`',
              '6. PR title must follow conventional commits format',
              '7. Do NOT add any markdown/docs/report files to the PR — only the 5 code files',
              '',
              '### PR description template:',
              '```',
              '## OTT SEO Pipeline Improvements',
              '',
              '### Fix 1: SSR Diff Check wired up',
              '- `crawler.ts`: fetches raw HTML (no JS) alongside Playwright HTML',
              '- `runner.ts`: calls `compareRendering()` and saves `js_rendering` issues to DB',
              '- Detects when Google cannot see title/schema/meta in first crawl wave',
              '',
              '### Fix 2: OTT Schema Type Check',
              '- `/movies/`, `/shows/`, `/watch/` pages now checked for `VideoObject`/`Movie`/`TVSeries`',
              '- Critical issue raised when content page has no OTT-specific schema',
              '',
              '### Fix 3: Hreflang Check',
              '- Dialect pages (`/haryanvi/`, `/bhojpuri/`, etc.) checked for `hreflang` tags',
              '- Warning raised when missing or x-default absent',
              '',
              '### Fix 4: Video Sitemap Generator',
              '- New `generateVideoSitemap()` function with Google video namespace',
              '- Supports thumbnail, duration, rating, tags, `requires_subscription`',
              '```',
              '',
              '### After PR is raised — Slack notification',
              'curl -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d \'{"text": "*SEO Pipeline OTT Improvements — ' + date + '*\\nHi <@U07A91AB7GW>, 4 OTT SEO improvements implemented in stage-seo-pipeline. PR: <PR_URL>\\n\\n*Changes:*\\n1. SSR diff check wired up\\n2. OTT schema type check (VideoObject/Movie/TVSeries)\\n3. Hreflang check for dialect pages\\n4. Video sitemap generator"}\'',
              '',
              'CRITICAL: Use <@U07A91AB7GW> exactly as written for Slack mention.',
            ].join('\\n');
            console.log(JSON.stringify(desc));
          ")

          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/companies/$COMPANY_ID/issues" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"OTT SEO Pipeline Improvements — ${DATE} (SSR diff + schema + hreflang + video sitemap)\",
              \"description\": $DESC_JSON,
              \"status\": \"todo\",
              \"priority\": \"critical\",
              \"assigneeAgentId\": \"$AGENT_ID\"
            }" && echo "Issue created" || echo "Issue creation failed"

          curl -s -X POST \
            "$PAPERCLIP_API_URL/api/agents/$AGENT_ID/wakeup" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"reason\": \"OTT SEO Pipeline Improvements ${DATE}\"}" \
            && echo "Agent wakeup sent" || echo "Wakeup failed"
