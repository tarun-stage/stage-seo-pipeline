name: ASO Metadata Push

on:
  push:
    branches:
      - main
    paths:
      - 'aso/metadata/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to push'
        required: true
        default: 'both'
        type: choice
        options:
          - android
          - ios
          - both

jobs:
  push-android:
    name: Push Android Metadata to Play Store
    runs-on: self-hosted
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'both') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane -N

      - name: Write Play Store key to file
        run: echo "${{ secrets.PLAY_STORE_JSON_KEY_B64 }}" | base64 -d > /tmp/play-store-key.json

      - name: Verify JSON file
        run: node -e "JSON.parse(require('fs').readFileSync('/tmp/play-store-key.json','utf8')); console.log('JSON valid, size:', require('fs').statSync('/tmp/play-store-key.json').size)"

      - name: Push Android metadata to Play Store
        working-directory: aso
        env:
          PLAY_STORE_KEY_PATH: /tmp/play-store-key.json
        run: fastlane android update_metadata

      - name: Notify via Paperclip on success
        if: success()
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_ASO_API_KEY }}
        run: |
          curl -s -X POST "$PAPERCLIP_API_URL/api/companies/03319c0f-9679-474a-90e2-7004053fdef2/issues" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"title\": \"ASO Android metadata pushed ✅ — ${{ github.run_id }}\", \"description\": \"Android metadata successfully pushed to Play Store.\\n\\nTriggered by: ${{ github.actor }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"status\": \"done\", \"priority\": \"low\"}" \
            && echo "Paperclip notified" || echo "Paperclip notify failed (non-fatal)"

      - name: Notify via Paperclip on failure
        if: failure()
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_ASO_API_KEY }}
        run: |
          curl -s -X POST "$PAPERCLIP_API_URL/api/companies/03319c0f-9679-474a-90e2-7004053fdef2/issues" \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"title\": \"ASO Android metadata push FAILED ❌ — ${{ github.run_id }}\", \"description\": \"Android metadata push to Play Store failed.\\n\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"status\": \"todo\", \"priority\": \"high\"}" \
            && echo "Paperclip notified" || echo "Paperclip notify failed (non-fatal)"

  push-ios:
    name: Push iOS Metadata to App Store
    runs-on: self-hosted
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'both')
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane -N

      - name: Push iOS metadata to App Store Connect
        working-directory: aso
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: fastlane ios update_metadata
