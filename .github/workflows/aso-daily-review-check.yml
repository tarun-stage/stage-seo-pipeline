name: ASO Daily Review Check

on:
  schedule:
    - cron: '30 4 * * *'  # Daily 10:00 AM IST (4:30 AM UTC)
  workflow_dispatch:

jobs:
  check-reviews:
    name: Fetch Reviews & Create CEO Task
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # Restore weekly avg history cache
      - name: Restore review history cache
        uses: actions/cache@v4
        with:
          path: .aso-review-history.json
          key: aso-review-history-${{ runner.os }}
          restore-keys: aso-review-history-

      - name: Write Play Store key
        run: echo "${{ secrets.PLAY_STORE_JSON_KEY_B64 }}" | base64 -d > /tmp/play-store-key.json

      - name: Install googleapis
        run: npm install googleapis

      - name: Fetch reviews & create Paperclip issue for CEO
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_ASO_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          node << 'SCRIPT'
          const { google } = require('googleapis');
          const fs = require('fs');
          const https = require('https');
          const http = require('http');

          const HISTORY_FILE = '.aso-review-history.json';

          function loadHistory() {
            try { return JSON.parse(fs.readFileSync(HISTORY_FILE, 'utf8')); }
            catch { return {}; }
          }

          function saveHistory(data) {
            fs.writeFileSync(HISTORY_FILE, JSON.stringify(data, null, 2));
          }

          async function main() {
            const credentials = JSON.parse(fs.readFileSync('/tmp/play-store-key.json', 'utf8'));
            const auth = new google.auth.GoogleAuth({
              credentials,
              scopes: ['https://www.googleapis.com/auth/androidpublisher'],
            });

            const androidpublisher = google.androidpublisher({ version: 'v3', auth });
            const PACKAGE = 'in.stage';

            const res = await androidpublisher.reviews.list({ packageName: PACKAGE, maxResults: 100 });
            const reviews = res.data.reviews || [];

            const now = Date.now();
            const yesterday = now - 24 * 60 * 60 * 1000;
            const sevenDaysAgo = now - 7 * 24 * 60 * 60 * 1000;

            // Bad reviews last 24h without a developer reply
            const badReviews = reviews.filter(r => {
              const comment = r.comments && r.comments[0] && r.comments[0].userComment;
              if (!comment) return false;
              const ts = parseInt((comment.lastModified && comment.lastModified.seconds) || '0') * 1000;
              const hasReply = r.comments && r.comments.some(c => c.developerComment);
              return comment.starRating <= 3 && ts >= yesterday && !hasReply;
            });

            // This week avg from API
            const thisWeekReviews = reviews.filter(r => {
              const comment = r.comments && r.comments[0] && r.comments[0].userComment;
              if (!comment) return false;
              const ts = parseInt((comment.lastModified && comment.lastModified.seconds) || '0') * 1000;
              return ts >= sevenDaysAgo && ts < now;
            });

            const thisWeekAvg = thisWeekReviews.length
              ? (thisWeekReviews.reduce((s, r) => s + r.comments[0].userComment.starRating, 0) / thisWeekReviews.length).toFixed(2)
              : null;

            // Load persisted history for last week avg
            const history = loadHistory();
            const todayKey = new Date().toISOString().split('T')[0];
            const lastWeekKey = new Date(now - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            let lastWeekAvg = history[lastWeekKey] || null;
            if (!lastWeekAvg) {
              const prev = Object.keys(history).filter(k => k < todayKey).sort().pop();
              if (prev) lastWeekAvg = history[prev];
            }

            // Save today's avg to history
            if (thisWeekAvg) {
              history[todayKey] = thisWeekAvg;
              // Keep only last 30 days
              const cutoff = new Date(now - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
              Object.keys(history).forEach(k => { if (k < cutoff) delete history[k]; });
              saveHistory(history);
            }

            const drop = (thisWeekAvg && lastWeekAvg)
              ? (parseFloat(lastWeekAvg) - parseFloat(thisWeekAvg)).toFixed(2)
              : null;
            const hasDrop = drop !== null && parseFloat(drop) > 0.1;

            const trendLine = !thisWeekAvg ? 'Insufficient data'
              : !lastWeekAvg ? `This week: ${thisWeekAvg} ⭐ (building history — no prior data yet)`
              : hasDrop ? `⬇️ DROP ${drop} stars: ${lastWeekAvg} → ${thisWeekAvg}`
              : parseFloat(drop) < -0.1 ? `⬆️ IMPROVED ${Math.abs(drop)} stars: ${lastWeekAvg} → ${thisWeekAvg}`
              : `➡️ Stable: ${thisWeekAvg} ⭐`;

            const date = new Date().toISOString().split('T')[0];
            const hasProblem = badReviews.length > 0 || hasDrop;
            const priority = hasProblem ? 'high' : 'low';

            let title = hasProblem
              ? `[ASO Alert] ${badReviews.length} negative reviews${hasDrop ? `, rating drop detected` : ''} — ${date}`
              : `[ASO] Daily Review Check — All clear ✅ ${date}`;

            let body = `## ASO Daily Review Report — ${date}\n\n`;
            body += `### Rating Trend\n`;
            body += `> Note: These averages are from the last 100 reviews fetched via API. Overall app rating (4.5★) is unaffected.\n\n`;
            body += `- This week avg: **${thisWeekAvg || 'N/A'}★** | Last week avg: **${lastWeekAvg || 'N/A'}★**\n`;
            body += `- ${trendLine}\n\n`;

            body += `### Negative Reviews (last 24h, no reply): ${badReviews.length}\n\n`;
            if (badReviews.length > 0) {
              badReviews.slice(0, 15).forEach(r => {
                const c = r.comments[0].userComment;
                const text = (c.text || '(no text)').slice(0, 200).replace(/\n/g, ' ');
                body += `**${c.starRating}/5 ⭐** — "${text}"\n\n`;
              });
              body += `### What to do\n`;
              body += `1. Run review_responder.js to auto-reply\n`;
              body += `2. Note common complaints for metadata updates\n`;
            } else {
              body += `_No new negative reviews in last 24h_ ✅\n\n`;
            }

            if (hasDrop) {
              body += `\n### ⚠️ Rating Drop Alert\n`;
              body += `Rating dropped ${drop} stars vs last week.\n`;
            }

            body += `\n---\n_Generated by ASO Daily Review Check workflow_`;

            // POST to Paperclip
            const apiBase = process.env.PAPERCLIP_API_URL.replace(/\/$/, '');
            const COMPANY_ID = '03319c0f-9679-474a-90e2-7004053fdef2';
            const CEO_AGENT_ID = 'b4802fc6-f46a-443f-a5a9-86028686b5fc';

            const payload = JSON.stringify({ title, description: body, priority, assigneeAgentId: CEO_AGENT_ID });
            const url = new URL(`${apiBase}/api/companies/${COMPANY_ID}/issues`);
            const client = url.protocol === 'https:' ? https : http;

            await new Promise((resolve, reject) => {
              const req = client.request({
                hostname: url.hostname, port: url.port || (url.protocol === 'https:' ? 443 : 80),
                path: url.pathname, method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${process.env.PAPERCLIP_API_KEY}`, 'Content-Length': Buffer.byteLength(payload) },
              }, res => { let d=''; res.on('data',c=>d+=c); res.on('end',()=>{ console.log(`Paperclip [${res.statusCode}]:`, d.slice(0,200)); resolve(); }); });
              req.on('error', reject); req.write(payload); req.end();
            });

            // Slack
            const ratingNote = `_Recent review avg only (last 100 reviews). Overall app rating: 4.5★ (1.78L reviews)_`;
            const reviewLines = badReviews.slice(0,5).map(r => {
              const c = r.comments[0].userComment;
              return `  ${'⭐'.repeat(c.starRating)} — "${(c.text||'').slice(0,100).replace(/\n/g,' ')}"`;
            }).join('\n');

            const slackText = [
              `*ASO Daily Review Check — ${date}* ${hasProblem ? '⚠️' : '✅'}`,
              `Package: in.stage (Google Play)`,
              ``,
              `*Recent Review Avg (last 7d)*`,
              `• This week: ${thisWeekAvg || 'N/A'} ⭐ | Last week: ${lastWeekAvg || 'N/A'} ⭐`,
              `• ${trendLine}`,
              ratingNote,
              ``,
              `*Negative Reviews (last 24h):* ${badReviews.length > 0 ? badReviews.length : 'None — no action needed'}`,
              reviewLines || '',
              `Triggered by: GitHub Actions (scheduled)`,
            ].filter(l => l !== '').join('\n');

            const slackPayload = JSON.stringify({ text: slackText });
            const slackUrl = new URL(process.env.SLACK_WEBHOOK_URL);
            await new Promise((resolve) => {
              const req = https.request({
                hostname: slackUrl.hostname, path: slackUrl.pathname, method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(slackPayload) },
              }, res => { res.on('data',()=>{}); res.on('end',()=>{ console.log(`Slack [${res.statusCode}]`); resolve(); }); });
              req.on('error', e => { console.log('Slack error:', e.message); resolve(); });
              req.write(slackPayload); req.end();
            });

            console.log(`Done — bad reviews: ${badReviews.length}, trend: ${trendLine}`);
          }

          main().catch(e => { console.error(e.message); process.exit(1); });
          SCRIPT

      # Save updated history cache
      - name: Save review history cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .aso-review-history.json
          key: aso-review-history-${{ runner.os }}
